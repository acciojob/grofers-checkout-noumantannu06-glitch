<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- the entire body must be written by student -->
     <h1>Grofers Checkout</h1>
    
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Price (₹)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="item">Apples (1kg)</td>
                <td class="prices" data-ns-test="prices">250</td>
            </tr>
            <tr>
                <td class="item">Milk (1L)</td>
                <td class="prices" data-ns-test="prices">65</td>
            </tr>
            <tr>
                <td class="item">Bread</td>
                <td class="prices" data-ns-test="prices">45</td>
            </tr>
            <tr>
                <td class="item">Eggs (6)</td>
                <td class="prices" data-ns-test="prices">120</td>
            </tr>
            <tr>
                <td class="item">Rice (1kg)</td>
                <td class="prices" data-ns-test="prices">80</td>
            </tr>
        </tbody>
    </table>

    <button data-ns-test="checkout-button">Checkout</button>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
